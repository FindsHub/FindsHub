<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - FindsHub</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">FindsHub.</a>
            <button class="nav-toggle" aria-label="Toggle navigation" id="navToggle">
                <span class="nav-toggle-icon"></span>
            </button>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="categories.html" class="active">Categories</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container mt-xxl mb-lg page-main">
        <div class="section-header">
            <h2>All Products</h2>
            <div class="filter-controls">
                <select id="categoryFilter" class="category-select" aria-label="Filter by category">
                    <option value="all">All Categories</option>
                    <option value="decor">Decor</option>
                    <option value="wall-art">Wall Art</option>
                    <option value="textiles">Textiles</option>
                    <option value="mirrors">Mirrors</option>
                    <option value="lighting">Lighting</option>
                </select>
            </div>
        </div>

        <div class="product-grid" id="categoryGrid">
            <div class="loading-state">Loading products...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="disclosure.html">Affiliate Disclosure</a>
            </div>
            <p class="footer-copy">&copy; 2026 FindsHub. As an Amazon Associate, we earn from qualifying purchases.</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="assets/js/app.js"></script>
</body>

</html>
