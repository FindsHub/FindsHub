<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Product Details | FindsHub</title>
    <meta name="description" content="Product details and reviews.">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                Finds<span>Hub</span>
            </a>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="search-bar">
                <input type="text" id="main-search" placeholder="Search products..."
                    onkeypress="if(event.key === 'Enter') window.location.href='category.html?search='+this.value">
            </div>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="category.html">Categories</a>
                <a href="about.html">About</a>
            </nav>
        </div>
    </header>

    <main class="container pt-4 pb-4" style="margin-bottom: 4rem;">
        <div id="product-detail-container">
            <div class="text-center py-4">Loading product details...</div>
        </div>

        <h2 class="section-title">Related Products</h2>
        <div class="product-grid" id="related-grid"
            style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
            <!-- Related products dynamically loaded here -->
        </div>
    </main>

    <footer style="padding: 2rem 0; margin-top: auto;">
        <div class="container footer-bottom" style="padding-top: 0; border: none;">
            <p>FindsHub is a participant in the Amazon Associates Program. As an Amazon Associate, we earn from
                qualifying purchases.</p>
            <p style="margin-top: 0.5rem;"><a href="privacy.html"
                    style="color: inherit; text-decoration: underline;">Privacy Policy</a> | <a href="disclaimer.html"
                    style="color: inherit; text-decoration: underline;">Disclaimer</a> | <a href="contact.html"
                    style="color: inherit; text-decoration: underline;">Contact Us</a></p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
