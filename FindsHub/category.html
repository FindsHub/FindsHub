<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Categories | FindsHub</title>
    <meta name="description" content="Browse products by category on FindsHub.">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                Finds<span>Hub</span>
            </a>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="category.html" class="active">Categories</a>
                <a href="about.html">About</a>
            </nav>
        </div>
    </header>

    <main class="container mb-4">
        <h1 class="section-title" style="margin-top: 2rem;">Shop By Category</h1>

        <div class="controls-bar">
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <div class="search-bar" style="margin: 0; width: 250px;">
                    <input type="text" id="search-input" placeholder="Search products...">
                </div>

                <div class="filters">
                    <select id="category-filter">
                        <option value="">All Categories</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Home">Home</option>
                        <option value="Fitness">Fitness</option>
                        <option value="Kitchen">Kitchen</option>
                    </select>
                </div>
            </div>

            <div class="sort">
                <select id="sort-filter">
                    <option value="">Sort By: Default</option>
                    <option value="newest">Newest Arrivals</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="rating">Highest Rated</option>
                </select>
            </div>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Products dynamically loaded here via script.js -->
        </div>

        <div class="text-center" style="margin-bottom: 4rem;">
            <button id="load-more-btn" class="btn btn-primary" style="padding: 1rem 3rem;">Load More</button>
        </div>
    </main>

    <footer style="padding: 2rem 0; margin-top: auto;">
        <div class="container footer-bottom" style="padding-top: 0; border: none;">
            <p>FindsHub is a participant in the Amazon Associates Program. As an Amazon Associate, we earn from
                qualifying purchases.</p>
            <p style="margin-top: 0.5rem;"><a href="privacy.html"
                    style="color: inherit; text-decoration: underline;">Privacy Policy</a> | <a href="disclaimer.html"
                    style="color: inherit; text-decoration: underline;">Disclaimer</a> | <a href="contact.html"
                    style="color: inherit; text-decoration: underline;">Contact Us</a></p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
