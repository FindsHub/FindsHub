<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Contact Us | FindsHub</title>
    <meta name="description" content="Contact the FindsHub team.">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                Finds<span>Hub</span>
            </a>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="category.html">Categories</a>
                <a href="about.html">About</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="static-page">
            <h1>Contact Us</h1>
            <p>Have a question or a product recommendation? We'd love to hear from you!</p>

            <form style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;"
                onsubmit="event.preventDefault(); alert('Message sent!');">
                <div>
                    <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Name</label>
                    <input type="text" id="name" required
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                <div>
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email</label>
                    <input type="email" id="email" required
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                <div>
                    <label for="message"
                        style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Message</label>
                    <textarea id="message" rows="5" required
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-family: inherit; resize: vertical;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="align-self: flex-start;">Send Message</button>
            </form>
        </div>
    </main>

    <footer style="padding: 2rem 0; margin-top: auto;">
        <div class="container footer-bottom" style="padding-top: 0; border: none;">
            <p>FindsHub is a participant in the Amazon Associates Program.</p>
            <p style="margin-top: 0.5rem;"><a href="privacy.html"
                    style="color: inherit; text-decoration: underline;">Privacy Policy</a> | <a href="disclaimer.html"
                    style="color: inherit; text-decoration: underline;">Disclaimer</a> | <a href="contact.html"
                    style="color: inherit; text-decoration: underline;">Contact Us</a></p>
        </div>
    </footer>
</body>

</html>
