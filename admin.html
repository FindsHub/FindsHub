<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FindsHub</title>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>

<body>
    <header class="admin-header">
        <h1>FindsHub Local Admin</h1>
        <a href="index.html" class="btn btn-outline"
            style="border:1px solid #d1d5db; color:#374151; text-decoration:none;">View Live Site</a>
    </header>

    <div class="admin-container">
        <!-- Form Panel -->
        <aside class="admin-panel">
            <h2 id="formTitle">Add New Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">

                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" required>
                </div>

                <div class="form-group">
                    <label for="price">Price (USD) *</label>
                    <input type="number" step="0.01" id="price" required>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" required>
                        <option value="decor">Decor</option>
                        <option value="wall-art">Wall Art</option>
                        <option value="textiles">Textiles</option>
                        <option value="mirrors">Mirrors</option>
                        <option value="lighting">Lighting</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="image">Image URL *</label>
                    <input type="url" id="image" required>
                </div>

                <div class="form-group">
                    <label for="affiliateLink">Amazon Affiliate Link *</label>
                    <input type="url" id="affiliateLink" required>
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label for="features">Features (comma separated)</label>
                    <textarea id="features" rows="2" placeholder="Feature 1, Feature 2, Feature 3"></textarea>
                </div>

                <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;" id="saveBtn">Save Product</button>
                    <button type="button" class="btn" style="background:#e5e7eb; color:#374151;"
                        id="cancelBtn">Cancel</button>
                </div>
            </form>
        </aside>

        <!-- Table Panel -->
        <main class="table-container">
            <div class="table-header">
                <h2>Product Catalog</h2>
                <button id="exportBtn" class="btn btn-primary">Export products.json</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <tr>
                        <td colspan="5" style="text-align:center;">Loading products...</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <script src="assets/js/admin.js"></script>
</body>

</html>
